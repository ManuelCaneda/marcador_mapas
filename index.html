<!DOCTYPE html>
<html lang="es">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Leaflet (Mapa) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Bootstrap  -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"
    defer></script>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Scripts Propios -->
  <link rel="stylesheet" href="styles/styles.css">
  <script src="scripts/db.js" defer></script>
  <script src="scripts/script.js" type="module" defer></script>
</head>

<body>
  <main>
    <section id="menu-hamburguesa">
      <h1 class="text-center pt-2 fw-bold">Categorías</h1>
      <hr>
      <form action="">
        <div class="d-flex flex-column gap-2 p-1 px-3 form-group">
          <label for="buscador" class="fw-bold">Buscador</label>
          <input type="text" id="buscador" class="form-control" placeholder="Dirección...">
          <button class="btn btn-primary">Buscar</button>
        </div>
      </form>
      <hr>
      <div id="crear-categorias" class="">
        <form action="">
          <div class="d-flex flex-column gap-2 p-1 px-3 form-group">
            <label for="crear-categoria" class="fw-bold">Crear categoría</label>
            <div class="d-flex gap-2">
              <input type="text" id="crear-categoria" class="form-control" placeholder="Nombre...">
              <button class="btn btn-primary"> + </button>
            </div>
          </div>
        </form>
        <hr>
        <div class="contenedor-lista-marcas">
          <h3 class="text-center fw-bold">Lista de marcas</h3>
          <div class="lista-marcas p-2 d-flex flex-column gap-2">
            <p class="text-center">Cargando...</p>
          </div>
        </div>
      </div>
    </section>
    <div id="map"></div>
  </main>
</body>

</html>
